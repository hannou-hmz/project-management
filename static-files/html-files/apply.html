<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply to Project</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        textarea, input {
            width: 100%;
            padding: 8px;
        }
        button {
            padding: 10px 15px;
        }
        .project-box {
            background: #f4f4f4;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Apply to Project</h2>

    <!-- Project Info (static for now, later fill from backend) -->
    <div class="project-box">
        <h3 id="projectTitle">Smart Agriculture System</h3>
        <p id="projectDesc">AI-based system to monitor crops and optimize farming.</p>
        <p><strong>Required Skills:</strong> Java, Node.js</p>
    </div>

    <!-- Application Form -->
    <form id="applicationForm">

        <!-- Hidden project id -->
        <input type="hidden" id="project_id" value="1">

        <!-- Motivation -->
        <div class="form-group">
            <label>Motivation:</label>
            <textarea id="motivation" rows="4" required></textarea>
        </div>

        <!-- Skills -->
        <div class="form-group">
            <label>Your Skills:</label>
            <input type="text" id="skills" placeholder="Java, Node.js" required>
        </div>

        <!-- Experience -->
        <div class="form-group">
            <label>Experience:</label>
            <textarea id="experience" rows="3"></textarea>
        </div>

        <!-- Availability -->
        <div class="form-group">
            <label>Availability:</label>
            <input type="text" id="availability" placeholder="e.g. 10 hours/week">
        </div>

        <!-- GitHub -->
        <div class="form-group">
            <label>GitHub / Portfolio:</label>
            <input type="url" id="github">
        </div>

        <button type="submit">Apply</button>
    </form>

</div>

</body>
</html>
