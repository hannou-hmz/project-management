<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../styling/signup.css">
    <link rel="icon" href="./img/fav.png">
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <form method="POST" action="/signup">

    <p>I am a</p>

    <div class="roles">
      <div class="role active" data-role="3">Student</div>
      <div class="role" data-role="2">Instructor</div>
    </div>

    <!-- hidden input -->
    <input type="hidden" name="role" id="role" value="3">

    <input type="text" name="username" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>

    <select name="department" required>
      <option value="">Select your department</option>
      <option value="302">Computer Science</option>
      <option value="405">Industrial Engineering</option>
      <option value="301">Robotic Engineering</option>
      <option value="200">Software Engineering</option>
      <option value="101">Chemical Engineering</option>
      <option value="111">Electrical Engineering</option>
    </select>

    <input type="number" name="age" placeholder="Age" required>
    <input type="password" name="password" placeholder="Password" required>
    <input type="password" placeholder="Confirm Password" required>

    <button type="submit">Create Account</button>

  </form>
</div>

<script>
  const roles = document.querySelectorAll('.role');
  const input = document.getElementById('role');

  roles.forEach(div => {
    div.addEventListener('click', () => {
      const role = div.dataset.role;

      input.value = role;

      roles.forEach(r => r.classList.remove('active'));
      div.classList.add('active');
    });
  });
</script>

</body>
</html>
