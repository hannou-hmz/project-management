<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Creation</title>
    <link rel="stylesheet" href="../styling/project.css">
</head>
<body>

    <h2>Create a New Project</h2>
    <form action="/student/projects" method="POST" id="projectForm">
        <!-- Project Title -->
        <div class="form-group">
            <label for="title">Project Title:</label>
            <input type="text" id="title" name="title" required>
        </div>

        <!-- Category -->
        <div class="form-group">
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">--Select Category--</option>
                <option value="1">TUBITAK</option>
                <option value="2">Teknofest</option>
                <option value="3">Course Project</option>
            </select>
        </div>

        <!-- Description -->
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="5" required></textarea>
        </div>

        <!-- Required Skills -->
        <div class="form-group">
            <label for="skills">Required Skills (comma separated):</label>
            <input type="text" id="skills" name="skills" placeholder="e.g., Java, NodeJS">
        </div>

        <!-- Team Size -->
        <div class="form-group">
            <label>Team Size:</label>
            <div class="team-size-controls">
                <button type="button" id="decreaseTeam">-</button>
                <span id="teamSize">1</span>
                <input type="hidden" id="teamSizeInput" name="teamSize" value="1" min="1">
                <button type="button" id="increaseTeam">+</button>
            </div>
        </div>

        <div>
            <label for="myCheckbox"> require advisor ? </label>
            <input style="height: 20px; width: 20px;" type="checkbox" name="reqAdvisor" id="myCheckbox" value="0">
        </div>

        <br>
        <br>
        <!-- Budget -->
        <div class="form-group">
            <label for="budget">Budget:</label>
            <input type="number" id="budget" name="budget" min="0" required>
        </div>

        <button type="submit" id="create-btn">Create Project</button>
    </form>

    <script>
        // Team size logic
       let teamSize = 1;

        const teamSizeSpan = document.getElementById('teamSize');
        const teamSizeInput = document.getElementById('teamSizeInput');

        document.getElementById('increaseTeam').addEventListener('click', () => {
            teamSize++;
            teamSizeSpan.textContent = teamSize;
            teamSizeInput.value = teamSize; // important
        });

        document.getElementById('decreaseTeam').addEventListener('click', () => {
            if (teamSize > 1) teamSize--;
            teamSizeSpan.textContent = teamSize;
            teamSizeInput.value = teamSize; // important
        });

        // const createBtn = document.getElementById('create-btn');
        // createBtn.addEventListener("click" , (event)=>{
        //     event.preventDefault();
        //     window.location.href = '/student/homepage'
        // });

        const checkbox = document.getElementById('myCheckbox');

        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                checkbox.value = "1"; // checked → 1
            } else {
                checkbox.value = "0"; // unchecked → 0
            }
        });
    </script>

</body>
</html>
