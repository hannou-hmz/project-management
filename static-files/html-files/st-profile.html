<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
        }

        input[readonly] {
            background-color: #eee;
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>My Profile</h2>

    <!-- Profile Photo -->
    <img id="preview"
         src="/uploads/<%= user.profile_photo || 'default.png' %>"
         alt="Profile Photo">

    <form action="/profile/update" method="POST" enctype="multipart/form-data">

        <!-- Photo -->
        <div class="form-group">
            <label>Change Photo:</label>
            <input type="file" name="photo" id="photo">
        </div>

        <!-- FULL NAME (READ ONLY) -->
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" value="<%= fullName %>" readonly>
        </div>

        <!-- DEPARTMENT (READ ONLY) -->
        <div class="form-group">
            <label>Department:</label>
            <input type="text" value="<%= department %>" readonly>
        </div>

        <!-- EMAIL (READ ONLY) -->
        <div class="form-group">
            <label>Email:</label>
            <input type="email" value="<%= user.email %>" readonly>
        </div>

        <!-- SKILLS (EDITABLE) -->
        <div class="form-group">
            <label>Skills:</label>
            <input type="text" name="skills" value="<%= user.skills %>">
        </div>

        <!-- BIO (EDITABLE) -->
        <div class="form-group">
            <label>Bio:</label>
            <textarea name="bio" rows="4"><%= user.bio %></textarea>
        </div>

        <button type="submit">Update Profile</button>
    </form>

</div>

</html>
