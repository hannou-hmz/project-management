<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
    <h1>Student/Advisor</h1>

    <form action="/signup" method="post">
        <input type="text" name="username" placeholder="Enter your full name"><br>
        <input type="email" name="email" placeholder="Enter your email "><br>
        <select name="department">
            <option value="se">Software engineering</option>
            <option value="cs">Computer engineering</option>
            <option value="ee">Electrical engineering</option>
            <option value="ce">Chemical engineering</option>
            <option value="ie">Industrial engineering</option>
        </select><br>
        <input type="password" name="password" placeholder="Enter a password"><br>
        <input type="password" placeholder="Confirm the password"><br><br>
        <button type="submit">sign-up</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
