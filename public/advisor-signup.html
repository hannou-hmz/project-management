<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor</title>
</head>
<body>
    <h1>Advisor</h1>
    <form action="/advisor/signup" method="post">
        <input type="text" name="username" placeholder="Enter your full name"><br>
        <input type="email" name="email" placeholder="Enter your email "><br>
        <input type="password" name="password" placeholder="Enter a password"><br>
        <input type="password" placeholder="Confirm the password"><br><br>
        <button type="submit">sign-up</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
